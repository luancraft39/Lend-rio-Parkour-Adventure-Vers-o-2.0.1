<!DOCTYPE html>
<!-- saved from url=(0043)https://www.lncc.br/~borges/php/testar.html -->
<html lang="pt-BR"><head><meta http-equiv="Content-Type" content="text/html; charset=windows-1252">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
<title>Lendário Parkour Adventure PRO Editon</title>

<style>
body{ margin:0; overflow:hidden; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; -webkit-user-select: none; background: #0b0f19; color: white;}
canvas{ display:none; background: #87CEEB; width: 100vw; height: 100vh; }

#rotate-device {
position: fixed; top: 0; left: 0; width: 100%; height: 100%;
background: #0b0f19; color: white; display: none;
flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; box-sizing: border-box;
}
#rotate-device h1 { color: #00f0ff; margin-bottom: 15px; font-size: 22px; }

/* &#127750; MENU PRINCIPAL COMPLETO */
#main-ui {
position: absolute; width: 100%; height: 100%;
background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1627163439134-7a8c47e08208?q=80&w=1920&auto=format&fit=crop') no-repeat center center;
background-size: cover; display: flex; align-items: center; justify-content: center; z-index: 50;
}
.glass-panel {
background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
width: 480px; height: 300px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.glass-panel h1 { font-size: 24px; color: #00f0ff; text-shadow: 0 0 15px rgba(0, 240, 255, 0.5); font-weight: 800; text-transform: uppercase; margin: 0; }
.glass-panel h2 { font-size: 12px; margin: 0 0 15px 0; color: #aaa; }

.menu-btn {
width: 100%; padding: 12px; margin: 5px 0; font-size: 16px; font-weight: bold;
background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3);
border-radius: 12px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;
}
.menu-btn:hover { background: #00f0ff; color: #000; transform: scale(1.02); }
.play-btn { background: #ff007f; color: white; border: none; }
.play-btn:hover { background: #ff3399; box-shadow: 0 0 15px rgba(255,0,127,0.5); }

.sub-panel { display: none; width: 100%; flex-direction: column; align-items: center; }
.config-row { width: 100%; display: flex; justify-content: space-between; margin: 10px 0; }
.toggle-btn { padding: 8px 12px; background: rgba(0,0,0,0.4); border: 1px solid #444; border-radius: 8px; color: #fff; cursor: pointer; font-size: 12px; width: 30%; font-weight: bold; }
.toggle-btn.active { background: #00f0ff; color: #000; }

/* &#128444;&#65039; ESCOLHA DE PERSONAGEM COM FOTOS */
.char-grid { display: flex; gap: 20px; margin: 10px 0; width: 100%; justify-content: center; }
.char-card {
background: rgba(0,0,0,0.5); border: 2px solid #444; border-radius: 15px;
width: 130px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center;
cursor: pointer; transition: 0.2s;
}
.char-card:hover { border-color: #00f0ff; transform: scale(1.05); }
.char-card.selected { border-color: #ff007f; background: rgba(255,0,127,0.15); box-shadow: 0 0 15px rgba(255,0,127,0.3); }

.char-preview { width: 40px; height: 60px; position: relative; margin-bottom: 10px; }
.char-head { width: 30px; height: 20px; background: #ffe0bd; position: absolute; top: 0; left: 5px; border-radius: 3px; }
.char-eyes { width: 4px; height: 4px; background: black; position: absolute; top: 6px; }
.char-hair { width: 30px; height: 10px; background: brown; position: absolute; top: -5px; left: 5px; }
.char-body-draw { width: 40px; height: 40px; position: absolute; top: 20px; left: 0; }

#chat-icon { position: absolute; top: 15px; right: 15px; width: 44px; height: 44px; background: rgba(0,0,0,0.6); border: 2.5px solid #00f0ff; border-radius: 50%; display: none; align-items: center; justify-content: center; color: #00f0ff; font-size: 22px; cursor: pointer; z-index: 15; }
#chat-container { position: absolute; bottom: 85px; left: 15px; width: 250px; height: 180px; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); border: 1.5px solid #00f0ff; border-radius: 12px; display: none; flex-direction: column; z-index: 14; overflow: hidden; }
#chat-messages { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
.message { max-width: 85%; padding: 6px 10px; border-radius: 10px; font-size: 11px; }
.npc-msg { align-self: flex-start; background: rgba(255, 255, 255, 0.15); color: #fff; }
.player-msg { align-self: flex-end; background: #ff007f; color: #fff; }
#chat-input-area { display: flex; padding: 5px; background: rgba(0, 0, 0, 0.4); gap: 5px; }
#chat-input { flex: 1; background: rgba(255, 255, 255, 0.1); border-radius: 6px; padding: 6px; color: white; outline: none; font-size: 12px; border: 1px solid rgba(255,255,255,0.3); }
#send-btn { background: #00f0ff; color: #000; border: none; border-radius: 6px; width: 30px; height: 30px; font-size: 14px; cursor: pointer; }

#gameControls{ position:absolute; bottom:20px; width:100%; display:none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index:10; pointer-events: none; }
.btn-group { display: flex; gap: 20px; pointer-events: auto; }
.ctrl-btn { font-size:24px; padding:15px; border-radius:15px; background: rgba(0, 0, 0, 0.6); color:white; border: 2px solid #00f0ff; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

/* &#9760;&#65039; GAME OVER MODERNO */
#death{
position:absolute; width:100%; height:100%; color:white; display:none;
align-items:center; justify-content:center; flex-direction:column; text-align:center; z-index: 21;
background: radial-gradient(circle, rgba(40,0,0,0.95) 0%, rgba(10,0,0,0.98) 100%);
}
.gameover-title {
font-size: 40px; font-weight: 900; color: #ff003c; text-transform: uppercase;
text-shadow: 0 0 20px rgba(255,0,60,0.6); margin-bottom: 25px; letter-spacing: 2px;
}
.death-panel {
background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
border: 1px solid rgba(255,0,60,0.3); border-radius: 20px;
width: 360px; padding: 25px; display: flex; flex-direction: column; align-items: center;
box-shadow: 0 0 30px rgba(255,0,60,0.2);
}
</style>
</head>

<body>

<audio id="music" loop="">
<source src="https://media.vocaroo.com/mp3/1iOle3gRKpTl" type="audio/mpeg">
</audio>

<div id="rotate-device">
    <h1>Por favor, deite o seu telefone</h1>
</div>

<div id="main-ui">
    <div class="glass-panel">
        <h1>Lendário Parkour Adventure PRO Editon</h1>
        <h2>Lendário Studio - Versão 12.5</h2>

        <div id="panel-main" style="display: flex; flex-direction: column; width: 100%; align-items: center;">
            <button class="menu-btn play-btn" onclick="playGame()">&#9654;&#65039; JOGAR</button>
            <div style="display: flex; width: 100%; gap: 10px;">
                <button class="menu-btn" onclick="openPanel(&#39;char&#39;)">&#129485; PERSONAGEM</button>
                <button class="menu-btn" onclick="openPanel(&#39;config&#39;)">&#9881;&#65039; GRÁFICOS</button>
            </div>
        </div>

        <div id="panel-config" class="sub-panel" style="display: none;">
            <h3>&#9881;&#65039; Gráficos</h3>
            <div class="config-row">
                <button id="graf-low" class="toggle-btn" onclick="setGraphics(&#39;low&#39;)">Baixo</button>
                <button id="graf-med" class="toggle-btn active" onclick="setGraphics(&#39;medium&#39;)">Médio</button>
                <button id="graf-pro" class="toggle-btn" onclick="setGraphics(&#39;pro&#39;)">PRO</button>
            </div>
            <button class="menu-btn play-btn" onclick="openPanel(&#39;main&#39;)">&#128190; SALVAR</button>
        </div>

        <div id="panel-char" class="sub-panel" style="display: none;">
            <h3>&#129485; Escolha seu Herói</h3>
            <div class="char-grid">
                
                <div id="char-boy" class="char-card selected" onclick="selectGender(&#39;boy&#39;)">
                    <div class="char-preview">
                        <div class="char-hair" style="height: 8px;"></div>
                        <div class="char-head">
                            <div class="char-eyes" style="left: 6px;"></div>
                            <div class="char-eyes" style="left: 20px;"></div>
                        </div>
                        <div class="char-body-draw" style="background: blue;"></div>
                    </div>
                    <span style="font-weight: bold; font-size: 14px;">Menino</span>
                </div>

                <div id="char-girl" class="char-card" onclick="selectGender(&#39;girl&#39;)">
                    <div class="char-preview">
                        <div class="char-hair" style="height: 12px; width: 40px; left: 0px;"></div>
                        <div class="char-head">
                            <div class="char-eyes" style="left: 6px;"></div>
                            <div class="char-eyes" style="left: 20px;"></div>
                        </div>
                        <div class="char-body-draw" style="background: pink;"></div>
                    </div>
                    <span style="font-weight: bold; font-size: 14px;">Menina</span>
                </div>

            </div>
            <button class="menu-btn play-btn" onclick="openPanel(&#39;main&#39;)" style="margin-top: 5px; width: 80%;">&#128190; SALVAR</button>
        </div>
    </div>
</div>

<div id="death">
    <div class="death-panel">
        <div class="gameover-title">&#9760;&#65039; GAME OVER</div>
        <button onclick="continueGame()" class="menu-btn play-btn" style="background: #ff003c;">&#128260; RENASCER</button>
        <button onclick="goMenu()" class="menu-btn" style="border-color: #00f0ff;">&#127968; VOLTAR AO MENU</button>
    </div>
</div>

<div id="chat-icon" onclick="toggleChat()">&#128172;</div>
<div id="chat-container">
    <div id="chat-messages"></div>
    <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Diga algo..." autocomplete="off">
        <button id="send-btn" onclick="sendMessageMobile()">&#10148;</button>
    </div>
</div>

<canvas id="game"></canvas>

<div id="gameControls">
    <div class="btn-group">
        <button class="ctrl-btn" id="left">&#11013;&#65039;</button>
        <button class="ctrl-btn" id="right">&#10145;&#65039;</button>
    </div>
    <div class="btn-group">
        <button class="ctrl-btn" id="jump">&#128640;</button>
    </div>
</div>

<script>
const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let gravity = 0.6
let gameRunning=false
let gameStarted=false
let graphicQuality = "medium";
let selectedChar = "boy";

let player={x:100,y:200,w:40,h:60,vx:0,vy:0,speed:5,jump:14,onGround:false,type:"boy", chatText: "", chatTimer: 0}
let npc={x:30,y:200,w:40,h:60,vx:0,vy:0,speed:3.5,jump:13,onGround:false,type:"boy",color:"#00ffaa", chatText: "", chatTimer: 0}

let checkpoint={x:100,y:200}
let keys={}

document.addEventListener("keydown",e=>{ if(document.activeElement === document.getElementById("chat-input")) return; keys[e.key.toLowerCase()]=true; })
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false)

function checkOrientation() {
    if (window.innerHeight > window.innerWidth && window.innerWidth < 768) {
        document.getElementById('rotate-device').style.display = "flex";
        if(gameRunning) gameRunning = false;
    } else {
        document.getElementById('rotate-device').style.display = "none";
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        if(gameStarted && document.getElementById('main-ui').style.display === "none") gameRunning = true;
    }
}
window.addEventListener('load', checkOrientation);
window.addEventListener('resize', checkOrientation);

function openPanel(panelId) {
    document.getElementById('panel-main').style.display = "none";
    document.getElementById('panel-config').style.display = "none";
    document.getElementById('panel-char').style.display = "none";
    document.getElementById('panel-' + panelId).style.display = "flex";
}

function setGraphics(level) {
    graphicQuality = level;
    document.getElementById('graf-low').classList.remove('active');
    document.getElementById('graf-med').classList.remove('active');
    document.getElementById('graf-pro').classList.remove('active');
    document.getElementById('graf-' + level).classList.add('active');
}

function selectGender(gender) { 
    selectedChar = gender; 
    document.getElementById('char-boy').classList.remove('selected');
    document.getElementById('char-girl').classList.remove('selected');
    document.getElementById('char-' + gender).classList.add('selected');
}

// --- CHAT IA ---
const chatMessages = document.getElementById("chat-messages");
const chatInput = document.getElementById("chat-input");
const chatContainer = document.getElementById("chat-container");

function addMessage(text, sender) {
    if(text === "") return;
    const msgDiv = document.createElement("div");
    msgDiv.className = `message ${sender}-msg`;
    msgDiv.innerText = text;
    chatMessages.appendChild(msgDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    if(sender === "player") { player.chatText = text; player.chatTimer = 240; } 
    else { npc.chatText = text; npc.chatTimer = 240; }
}

function superNpcBrain(text) {
    return "O mapa do Lendário Studio é top!";
}

function sendMessage() {
    const text = chatInput.value.trim();
    if(text === "") return;
    addMessage(text, "player");
    chatInput.value = "";
    chatInput.blur();
    setTimeout(() => addMessage(superNpcBrain(text), "npc"), 1000);
}

chatInput.addEventListener("keypress", e => { if(e.key === "Enter") sendMessage(); });
function sendMessageMobile() { sendMessage(); }
function toggleChat() { chatContainer.style.display = (chatContainer.style.display === "flex") ? "none" : "flex"; }

function playGame() {
    player.type = selectedChar;
    document.getElementById('main-ui').style.display = "none";
    canvas.style.display = "block";
    document.getElementById("gameControls").style.display = "flex";
    
    checkOrientation();
    gameRunning = true;
    document.getElementById("chat-icon").style.display = "flex";
    document.getElementById("music").play().catch(()=>{});

    if(!gameStarted){
        gameStarted=true;
        gameLoop();
        toggleChat();
        addMessage("O Lendário Studio voltou!", "npc");
        setTimeout(() => { if(chatContainer.style.display === "flex") toggleChat(); }, 3000);
    }
}

function continueGame(){
    document.getElementById("death").style.display="none";
    player.x=checkpoint.x; player.y=checkpoint.y; player.vx=0; player.vy=0;
    npc.x=checkpoint.x-40; npc.y=checkpoint.y; npc.vx=0; npc.vy=0;
    gameRunning=true;
}

function goMenu(){
    document.getElementById("death").style.display="none";
    document.getElementById('main-ui').style.display = "flex";
    canvas.style.display = "none";
    document.getElementById("gameControls").style.display = "none";
    document.getElementById("chat-icon").style.display = "none";
    if(chatContainer.style.display === "flex") toggleChat();
    gameRunning=false;
}

// --- BIOMAS E FÍSICA CLÁSSICA ---
let platforms = [];
platforms.push({x: -100, y: 260, w: 700, h: 60, biome: "floresta", type: "base"});
let lastPlatformX = 600;

function generatePlatform() {
    let gap = 150 + Math.random() * 200;
    let height = 150 + Math.random() * 180;
    
    let biome = "floresta";
    if(lastPlatformX > 2500 && lastPlatformX <= 5500) biome = "deserto";
    else if(lastPlatformX > 5500) biome = "gelo";

    platforms.push({ x: lastPlatformX, y: height, w: 140, h: 25, biome: biome, type: "floating" });
    lastPlatformX += gap;
}

for(let i=0; i<15; i++) generatePlatform();

let cameraX = 0;

function update() {
    if(!gameRunning) return;

    if(keys["a"]) player.vx = -player.speed;
    else if(keys["d"]) player.vx = player.speed;
    else player.vx = 0;

    if(keys[" "] && player.onGround) { player.vy = -player.jump; player.onGround = false; }

    player.vy += gravity; player.x += player.vx; player.y += player.vy; player.onGround = false;

    let distance = player.x - npc.x;
    if(Math.abs(distance) > 60) npc.vx = (distance > 0) ? npc.speed : -npc.speed;
    else npc.vx = 0;

    if(Math.abs(distance) > 30 && player.y < npc.y - 40 && npc.onGround) { npc.vy = -npc.jump; npc.onGround = false; }
    npc.vy += gravity; npc.x += npc.vx; npc.y += npc.vy; npc.onGround = false;

    // Colisão Clássica
    for(let p of platforms) {
        if(player.x < p.x+p.w && player.x+player.w > p.x && player.y < p.y+p.h && player.y+player.h > p.y) {
            if(player.vy > 0 && player.y + player.h < p.y + p.h/2 + 5) {
                player.y = p.y - player.h; player.vy = 0; player.onGround = true;
                checkpoint.x = p.x; checkpoint.y = p.y - 60;
            }
        }
        if(npc.x < p.x+p.w && npc.x+npc.w > p.x && npc.y < p.y+p.h && npc.y+npc.h > p.y) {
            if(npc.vy > 0 && npc.y + npc.h < p.y + p.h/2 + 5) { npc.y = p.y - npc.h; npc.vy = 0; npc.onGround = true; }
        }
    }

    if(player.x + canvas.width > lastPlatformX - 500) generatePlatform();

    if(player.y > 800) { gameRunning = false; document.getElementById("death").style.display = "flex"; }
    if(npc.y > 800) { npc.x = player.x - 50; npc.y = player.y - 20; npc.vy = 0; }

    cameraX += (player.x - canvas.width/3 - cameraX) * 0.1;

    if(player.chatTimer > 0) player.chatTimer--;
    if(npc.chatTimer > 0) npc.chatTimer--;
}

function drawOriginalCharacter(char, typeColor, label, isMe) {
    let px = char.x; let py = char.y;
    ctx.fillStyle = typeColor; ctx.fillRect(px, py+20, 40, 40);
    ctx.fillStyle = "#ffe0bd"; ctx.fillRect(px+5, py, 30, 20);
    ctx.fillStyle = "black"; ctx.fillRect(px+10, py+5, 4, 4); ctx.fillRect(px+25, py+5, 4, 4);
    ctx.fillStyle = "brown";
    if(char.type === "boy") ctx.fillRect(px+5, py-5, 30, 10);
    else { ctx.fillRect(px, py-5, 40, 15); ctx.fillRect(px-5, py+5, 10, 25); ctx.fillRect(px+35, py+5, 10, 25); }
    ctx.fillStyle = "#ffe0bd"; ctx.fillRect(px-5, py+25, 10, 10); ctx.fillRect(px+35, py+25, 10, 10);

    ctx.fillStyle = isMe ? "#00f0ff" : "white"; ctx.font = "bold 13px Arial"; ctx.textAlign = "center"; ctx.fillText(label, px + 20, py - 10);

    if(char.chatTimer > 0 && char.chatText !== "") {
        ctx.font = "bold 12px Arial"; let textWidth = ctx.measureText(char.chatText).width;
        let bW = textWidth + 20; let bX = px + 20 - bW/2; let bY = py - 60;
        ctx.fillStyle = "white"; ctx.fillRect(bX, bY, bW, 24); ctx.fillStyle = "black"; ctx.fillText(char.chatText, px + 20, bY + 16);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    let cameraY = player.y - canvas.height / 2;
    ctx.translate(-cameraX, -cameraY);

    let currentBiome = "floresta";
    if(player.x > 2500 && player.x <= 5500) currentBiome = "deserto";
    else if(player.x > 5500) currentBiome = "gelo";

    if(currentBiome === "floresta") canvas.style.background = "#87CEEB";
    else if(currentBiome === "deserto") canvas.style.background = "#FFD700";
    else if(currentBiome === "gelo") canvas.style.background = "#191970";

    for(let p of platforms) {
        ctx.fillStyle = p.biome === "gelo" ? "#4682B4" : (p.biome === "deserto" ? "#D2B48C" : "#8B4513");
        ctx.fillRect(p.x, p.y + 6, p.w, p.h - 6);
        ctx.fillStyle = p.biome === "gelo" ? "#ADD8E6" : (p.biome === "deserto" ? "#F4A460" : "#3cb043");
        ctx.fillRect(p.x, p.y, p.w, 8);
    }

    drawOriginalCharacter(player, player.type === "boy" ? "blue" : "pink", "Você", true);
    drawOriginalCharacter(npc, npc.color, "Amigo NPC", false);

    ctx.restore();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

const leftBtn = document.getElementById("left"); const rightBtn = document.getElementById("right"); const jumpBtn = document.getElementById("jump");
function hStart(k, e) { if(e) e.preventDefault(); keys[k]=true; }
function hEnd(k) { keys[k]=false; }
leftBtn.addEventListener("touchstart", e => hStart("a", e)); leftBtn.addEventListener("touchend", () => hEnd("a"));
rightBtn.addEventListener("touchstart", e => hStart("d", e)); rightBtn.addEventListener("touchend", () => hEnd("d"));
jumpBtn.addEventListener("touchstart", e => hStart(" ", e)); jumpBtn.addEventListener("touchend", () => hEnd(" "));
leftBtn.addEventListener("mousedown", () => hStart("a")); leftBtn.addEventListener("mouseup", () => hEnd("a"));
rightBtn.addEventListener("mousedown", () => hStart("d")); rightBtn.addEventListener("mouseup", () => hEnd("d"));
jumpBtn.addEventListener("mousedown", () => hStart(" ")); jumpBtn.addEventListener("mouseup", () => hEnd(" "));
</script>

</body></html>
